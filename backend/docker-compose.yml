version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: legaldiff
      POSTGRES_USER: legaldiff
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legaldiff_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legaldiff"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  llm-server:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    command: >
      --model /models/qwen2.5-7b-instruct-q4_k_m.gguf
      --n-gpu-layers 999
      --host 0.0.0.0
      --port 8000
      --ctx-size 4096
      --batch-size 512
      --temp 0.05
    ports:
      - "8000:8000"
    volumes:
      - ${MODELS_DIR:-./models}:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: >
      sh -c "alembic -c /app/backend/alembic.ini upgrade head &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8001 --workers 2"
    ports:
      - "8001:8001"
    volumes:
      - file_storage:/app/backend/storage
      - ../src:/app/src:ro
    environment:
      DATABASE_URL: "postgresql+asyncpg://legaldiff:${POSTGRES_PASSWORD:-legaldiff_secret}@postgres:5432/legaldiff"
      DATABASE_URL_SYNC: "postgresql://legaldiff:${POSTGRES_PASSWORD:-legaldiff_secret}@postgres:5432/legaldiff"
      REDIS_URL: "redis://redis:6379/0"
      LLM_BASE_URL: "http://llm-server:8000/v1"
      LLM_MODEL_NAME: "Qwen/Qwen2.5-7B-Instruct"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production}"
      STORAGE_ROOT: "/app/backend/storage"
      LOG_LEVEL: "INFO"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      llm-server:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: celery -A backend.celery_app worker --concurrency=1 --loglevel=info
    volumes:
      - file_storage:/app/backend/storage
      - ../src:/app/src:ro
    environment:
      DATABASE_URL: "postgresql+asyncpg://legaldiff:${POSTGRES_PASSWORD:-legaldiff_secret}@postgres:5432/legaldiff"
      DATABASE_URL_SYNC: "postgresql://legaldiff:${POSTGRES_PASSWORD:-legaldiff_secret}@postgres:5432/legaldiff"
      REDIS_URL: "redis://redis:6379/0"
      LLM_BASE_URL: "http://llm-server:8000/v1"
      LLM_MODEL_NAME: "Qwen/Qwen2.5-7B-Instruct"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production}"
      STORAGE_ROOT: "/app/backend/storage"
      LOG_LEVEL: "INFO"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      llm-server:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  postgres_data:
  redis_data:
  file_storage:
